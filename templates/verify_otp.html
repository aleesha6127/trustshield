<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  min-height:100vh; font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex; justify-content:center; align-items:center; color:white;
}
.cardy{
  width:100%; max-width:400px; padding:30px; 
  background:rgba(255,255,255,0.1); backdrop-filter:blur(15px);
  border-radius:20px;
}
input{ letter-spacing: 5px; text-align: center; font-size: 24px; font-weight: bold; background:rgba(255,255,255,0.1)!important; border:none!important; color:white!important; }
</style>
</head>
<body>
<div class="cardy text-center">
  <h4 class="fw-bold mb-2">Verify OTP</h4>
  <p class="small text-white-50">We sent a code to <br><b class="text-white">{{ email }}</b></p>
  
  {% if error %} <div class="alert alert-danger p-2 small">{{ error }}</div> {% endif %}

  <form method="POST">
    <input name="otp" type="number" class="form-control p-2 mb-3" placeholder="XXXXXX" required>
    <button class="btn btn-success w-100 py-2 fw-bold">Verify & Proceed</button>
  </form>
  <a href="/forgot_password" class="d-block mt-3 small text-white-50">Resend Code</a>
</div>
</body>
</html>
