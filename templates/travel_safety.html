<!DOCTYPE html>
<html>
<head>
<title>TrustShield – Travel Safety Advisor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* 2. Responsive Background & Typography */
body { 
    min-height: 100vh; 
    font-family: 'Poppins', Arial, sans-serif; 
    background: linear-gradient(135deg, #c7d2fe, #fecdd3, #bbf7d0); 
    background-size: 400% 400%; 
    animation: bgMove 12s infinite alternate; 
    padding-bottom: 50px;
}
@keyframes bgMove { 0%{background-position:left} 100%{background-position:right} }

.box { 
    backdrop-filter: blur(18px); 
    background: rgba(255,255,255,0.95); 
    border-radius: 22px; 
    padding: 25px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
    transition: transform 0.2s;
}

.header-card { 
    text-align: center; 
    padding: 30px; 
    border-radius: 22px; 
    background: linear-gradient(135deg, #1e3a8a, #4f46e5); 
    color: white; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
    margin-bottom: 20px;
}

.tag { 
    padding: 6px 14px; 
    border-radius: 20px; 
    font-weight: 700; 
    font-size: 13px; 
    color: #111; 
    white-space: nowrap; 
}

.section-title { 
    background: #f1f5f9; 
    padding: 10px 15px; 
    border-radius: 12px; 
    font-size: 14px; 
    font-weight: 700; 
    margin-bottom: 12px;
    border-left: 4px solid #4f46e5;
}

.city-title { 
    font-size: 24px; 
    font-weight: 900; 
    color: #020617; 
    text-transform: capitalize;
}

/* Spinner */
.loading-box { display:none; text-align:center; padding: 20px; }

/* MAP STYLING */
#travelMap {
    height: 300px; width: 100%;
    border-radius: 16px;
    margin-top: 15px;
    border: 1px solid rgba(0,0,0,0.1);
    display: none; /* Hidden until search */
}

/* CLICKABLE LIST ITEMS */
.place-item {
    cursor: pointer;
    padding: 10px;
    border-radius: 8px;
    transition: 0.2s;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
}
.place-item:hover { background: #e0e7ff; border-color: #6366f1; }
.place-btn { font-size: 12px; font-weight: bold; color: #4f46e5; }

/* Mobile Adjustments */
@media (max-width: 576px) {
    .header-card h2 { font-size: 1.5rem; }
    .box { padding: 15px; }
}
</style>
</head>

<body class="p-3 p-md-4">

<div class="container" style="max-width: 600px;"> 
  <button onclick="location.href='/dashboard'" class="btn btn-dark btn-sm mb-3 rounded-pill px-3">⬅ Dashboard</button>
  
  <div class="header-card">
    <h2 class="fw-bold mb-1">🌍 Travel Safe</h2> 
    <p class="mb-0 opacity-75 small">AI-Powered Global Safety Advisor</p>
  </div>

  <div class="box mb-3">
    <b>🔍 Search Destination</b>
    <div class="input-group mt-2">
        <input id="searchBox" class="form-control form-control-lg border-0 bg-light" placeholder="Enter any city (e.g. Dubai, London)...">
        <button onclick="fetchSafetyData()" class="btn btn-dark fw-bold">Analyze</button>
    </div>
  </div>

  <div id="loader" class="loading-box">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 small">Scanning city safety data...</p>
  </div>

  <div id="result" style="display:none;">
      
      <div class="box mb-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div class="city-title" id="cityName">...</div>
          <span id="safetyBadge" class="tag">Checking...</span>
        </div>
        <p id="riskDesc" class="mt-3 text-secondary small mb-0">...</p>
        
        <div id="travelMap"></div>
        <p class="text-center text-muted small mt-2 mb-0">Tap any location below to spot on map</p>
      </div>

      <div class="box mb-3">
        <div class="section-title">📝 AI Safety Tips</div>
        <ul id="tips" class="small mb-0 list-unstyled"></ul>
      </div>

      <div class="box mb-4">
        <div class="section-title">🚨 Emergency Services</div>
        
        <small class="text-muted fw-bold d-block mb-1">Police Stations</small>
        <div id="policeList" class="mb-3"></div>
        
        <small class="text-muted fw-bold d-block mb-1">Hospitals</small>
        <div id="hospitalList"></div>
      </div>

  </div>

  <div class="box mb-5">
    <div class="section-title">⚡ Universal Emergency</div>
    <div class="d-grid gap-2 mt-3">
        <a href="tel:112" class="btn btn-danger fw-bold py-2">📞 Global Emergency (112)</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map, currentCity = "";
let currentMarker = null;

// Initialize Map
function initMap() {
    if(map) return;
    map = L.map('travelMap').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
}

async function fetchSafetyData() {
    const city = document.getElementById("searchBox").value.trim();
    if (!city) return alert("Please enter a city name");
    
    currentCity = city;

    // UI Updates
    document.getElementById("loader").style.display = "block";
    document.getElementById("result").style.display = "none";

    try {
        const res = await fetch("/api/travel_analysis", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ city: city })
        });

        const data = await res.json();

        if (data.error) {
            alert("Error: " + data.error);
            return;
        }

        // Fill Data
        document.getElementById("cityName").innerText = city;
        document.getElementById("riskDesc").innerText = data.risk;

        // Badge Logic
        const badge = document.getElementById("safetyBadge");
        badge.innerText = data.safety;
        if (data.safety.toLowerCase().includes("safe")) badge.style.background = "#bbf7d0";
        else if (data.safety.toLowerCase().includes("moderate")) badge.style.background = "#fde68a";
        else badge.style.background = "#fecaca";

        // Fill Tips
        document.getElementById("tips").innerHTML = data.tips.map(item => `<li class="mb-2 d-flex gap-2"><span>✅</span> <span>${item}</span></li>`).join("");

        // Fill Clickable Lists
        fillInteractiveList("policeList", data.police, "👮‍♂️");
        fillInteractiveList("hospitalList", data.hospitals, "🏥");

        // Show Result & Map
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("travelMap").style.display = "block";
        
        // Refresh map size
        setTimeout(() => {
            initMap();
            map.invalidateSize();
            spotLocation(city); // Center map on city initially
        }, 500);

    } catch (err) {
        console.error(err);
        alert("Failed to fetch data. Please try again.");
        document.getElementById("loader").style.display = "none";
    }
}

// Generate Clickable List Items
function fillInteractiveList(id, items, icon) {
    const el = document.getElementById(id);
    el.innerHTML = items.map(item => `
        <div class="place-item" onclick="spotLocation('${item}')">
            <div class="d-flex align-items-center gap-2">
                <span>${icon}</span>
                <span class="small fw-bold">${item}</span>
            </div>
            <span class="place-btn">📍 SPOT</span>
        </div>
    `).join("");
}

// Geocode & Plot Location
async function spotLocation(placeName) {
    // Scroll to map
    document.getElementById("travelMap").scrollIntoView({behavior: "smooth", block: "center"});

    // Combine place + city for better accuracy (e.g. "Central Hospital, Kochi")
    const query = `${placeName}, ${currentCity}`;
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data && data.length > 0) {
            const lat = data[0].lat;
            const lon = data[0].lon;

            // Remove old marker
            if (currentMarker) map.removeLayer(currentMarker);

            // Add new marker
            currentMarker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`
                    <b>${placeName}</b><br>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank" style="color:blue;">Navigate Here ➜</a>
                `)
                .openPopup();

            // Fly to location
            map.flyTo([lat, lon], 15);
        } else {
            alert("Could not locate specific place on map. Showing city center instead.");
        }
    } catch (e) {
        console.log("Map Error:", e);
    }
}
</script>

</body>
</html>
