<!DOCTYPE html>
<html>
<head>
<title>TrustShield — Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{ 
  background:linear-gradient(135deg,#fde2e4,#e9d5ff,#c7d2fe); 
  min-height:100vh; 
  font-family:Poppins, Arial; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
}

.card{ 
  width: 100%;
  max-width: 480px;
  border-radius: 20px; 
  box-shadow: 0 30px 80px rgba(0,0,0,.25); 
}
.error{ color:red; font-size:13px; }

.pass-box{ position:relative; }
.eye{
 position:absolute;
 right:12px;
 top:9px;
 cursor:pointer;
 user-select:none;
 padding: 2px;
}

/* Face camera */
#video{
  width:100%;
  border-radius:12px;
  border:2px solid #ddd;
}
</style>
</head>

<body class="px-3 py-4">

<div class="card p-4">
  <h3 class="fw-bold text-center">🛡 TrustShield</h3>
  <p class="text-center text-muted mb-2">Create your account</p>
  <hr class="mt-2 mb-3">

  {% if error %}
  <div class="alert alert-danger text-center py-2 fs-6">{{ error }}</div>
  {% endif %}

  <form action="/register_user" method="POST" autocomplete="off">
    <label class="fw-bold small">Full Name</label>
    <input name="name" class="form-control" required>

    <label class="mt-2 fw-bold small">Email</label>
    <input name="email" type="email" class="form-control" required>

    <label class="mt-2 fw-bold small">Password</label>
    <div class="pass-box">
      <input name="password" id="pass" type="password" class="form-control" required minlength="6">
      <span class="eye" onclick="toggle('pass', this)">👁</span>
    </div>

    <label class="mt-2 fw-bold small">Confirm Password</label>
    <div class="pass-box">
      <input name="confirm_password" id="cpass" type="password" class="form-control" required>
      <span class="eye" onclick="toggle('cpass', this)">👁</span>
    </div>

    <hr>

    <!-- FACE CAPTURE -->
    <h6 class="fw-bold">📷 Live Face Capture</h6>
    <video id="video" autoplay muted></video>
    <div id="captured_preview" class="mt-2 text-center" style="display:none;">
      <p class="small text-success fw-bold mb-1">Captured Photo:</p>
      <img id="face_preview" style="width:100%; border-radius:12px; border:2px solid #28a745;">
    </div>
    <button type="button" class="btn btn-outline-success btn-sm mt-2 w-100" onclick="captureFace()">
      Capture Live Photo
    </button>

    <canvas id="canvas" hidden></canvas>
    <input type="hidden" name="face_image" id="face_image" required>

    <hr>

    <h6 class="fw-bold">🚨 Emergency Contacts</h6>
    <div id="contacts">
      <input name="contacts" type="tel" class="form-control contact mt-2" placeholder="Phone number 1" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
    </div>
    
    <button type="button" class="btn btn-outline-primary btn-sm mt-2 w-100" onclick="addContact()">➕ Add another contact</button>

    <hr>
    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">
      Create Account
    </button>
  </form>

  <p class="text-center mt-3 mb-0 small">
    Already have an account? <a href="/login" class="fw-bold">Login</a>
  </p>
</div>

<script>
// PASSWORD TOGGLE
function toggle(id, icon){
 let input = document.getElementById(id);
 if(input.type === "password"){
   input.type = "text";
   icon.innerText = "🙈";
 } else {
   input.type = "password";
   icon.innerText = "👁";
 }
}

// ADD CONTACT
function addContact(){
 let box=document.getElementById("contacts");
 let inp=document.createElement("input");
 inp.name="contacts"; 
 inp.type="tel";
 inp.className="form-control contact mt-2";
 inp.placeholder="Next Phone number";
 inp.pattern = "[0-9]{10}";
 inp.title = "Please enter a valid 10-digit phone number";
 inp.required = true;
 box.appendChild(inp);
}

// CAMERA ACCESS
const video = document.getElementById("video");
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(() => alert("Camera access denied"));

// ✅ FIXED FACE CAPTURE (ONLY CHANGE)
function captureFace(){
 const canvas = document.getElementById("canvas");

 // reduce resolution
 canvas.width = 320;
 canvas.height = 240;

 canvas.getContext("2d").drawImage(video, 0, 0, 320, 240);

 // compress image (JPEG)
 const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
 document.getElementById("face_image").value = dataUrl;
 
 // Show preview
 document.getElementById("face_preview").src = dataUrl;
 document.getElementById("captured_preview").style.display = "block";

 alert("Face captured successfully");
}
</script>

</body>
</html>
