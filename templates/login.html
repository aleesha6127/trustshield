<!DOCTYPE html>
<html>
<head>
<title>Login – TrustShield</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  min-height:100vh;
  font-family:Poppins, Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1a0e1f,#2d1b35,#4a1942);
  background-size:300% 300%;
  animation:bgmove 10s infinite alternate;
  padding: 20px;
}
@keyframes bgmove{ 0%{background-position:left} 100%{background-position:right} }

.cardy{
  width: 100%;
  max-width: 430px;
  padding: 30px 25px; 
  border-radius:22px;
  background:rgba(233, 30, 99, 0.1); 
  backdrop-filter:blur(15px);
  box-shadow:0 40px 120px rgba(233, 30, 99, 0.3); 
  color:white;
  border: 1px solid rgba(233, 30, 99, 0.2);
}

.sub{ color:#fce4ec; font-size:14px; }

input{ 
    background:rgba(233, 30, 99, 0.15)!important; 
    color:white!important; 
    border:1px solid rgba(233, 30, 99, 0.3)!important; 
    font-size: 16px !important; 
}
input::placeholder{color:#fce4ec!important;}

.eye{
 position:absolute;
 right:12px;
 top:10px;
 cursor:pointer;
 user-select:none;
 color: #fce4ec;
 padding: 5px;
 z-index: 10;
}

/* FACE CAMERA (ADDED) */
#video{
  width:100%;
  border-radius:14px;
  border:2px solid rgba(233, 30, 99, 0.4);
}

.btn-light {
  background: linear-gradient(135deg, #e91e63, #9c27b0);
  border: none;
  color: white;
}

.btn-light:hover {
  background: linear-gradient(135deg, #c2185b, #7b1fa2);
  color: white;
}

.btn-outline-light {
  border: 2px solid rgba(233, 30, 99, 0.5);
  background: rgba(233, 30, 99, 0.1);
  color: white;
}

.btn-outline-light:hover {
  background: rgba(233, 30, 99, 0.25);
  border-color: #e91e63;
  color: white;
}

.text-info {
  color: #e91e63 !important;
}

.alert-danger {
  background: rgba(220, 53, 69, 0.2);
  border: 1px solid rgba(220, 53, 69, 0.4);
  color: #ffcdd2;
}
</style>
</head>
<body>

<div class="cardy">
  <h3 class="fw-bold text-center">🛡 TrustShield</h3>
  <p class="text-center sub mb-3">Women Safety Companion</p>
  <hr class="text-light opacity-25">

  {% if error %}
  <div class="alert alert-danger text-center p-2 small">{{ error }}</div>
  {% endif %}

  <!-- 🔐 PASSWORD LOGIN (UNCHANGED) -->
  <form action="/login_user" method="POST" autocomplete="off">
    <label class="small fw-bold">Email</label>
    <input name="email" type="email" class="form-control mt-1 p-2" required>

    <label class="mt-3 small fw-bold">Password</label>
    <div style="position:relative">
      <input name="password" id="password" type="password" class="form-control mt-1 p-2" style="padding-right: 40px !important;" required>
      <span class="eye" onclick="toggle('password', this)">👁</span>
    </div>

    <button type="submit" class="btn btn-light text-dark fw-bold w-100 mt-4 py-2">
     Login
    </button>
  </form>

  <!-- 🔴 FACE LOGIN SECTION (ADDED ONLY) -->
  <hr class="text-light opacity-25">
  <h6 class="fw-bold text-center">OR</h6>

  <video id="video" autoplay muted></video>
  <div id="captured_preview" class="mt-2 text-center" style="display:none;">
    <p class="small text-success fw-bold mb-1">Captured Live Photo:</p>
    <img id="face_preview" style="width:100%; border-radius:12px; border:2px solid #28a745;">
  </div>
  <button id="faceLoginBtn" onclick="faceLogin()" class="btn btn-outline-light w-100 mt-3 fw-bold">
    Login with Face
  </button>

  <canvas id="canvas" hidden></canvas>

  <div class="text-end mt-2">
      <a href="/forgot_password" class="small text-white opacity-75 text-decoration-none">Forgot Password?</a>
  </div>

  <p class="text-center mt-3 sub mb-0">
    Don't have an account? <a href="/register" class="text-info fw-bold text-decoration-none">Create one</a>
  </p>
</div>

<script>
// PASSWORD TOGGLE (UNCHANGED)
function toggle(id, icon){
 let input = document.getElementById(id);
 if(input.type === "password"){
   input.type = "text";
   icon.innerText = "🙈";
 } else {
   input.type = "password";
   icon.innerText = "👁";
 }
}

// CAMERA ACCESS (ADDED)
const video = document.getElementById("video");
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(() => alert("Camera permission denied"));

// FACE LOGIN (ADDED)
function faceLogin(){
 const canvas = document.getElementById("canvas");
 
 // Ensure video is playing and has dimensions
 if (video.videoWidth === 0 || video.videoHeight === 0) {
    alert("Camera not ready. Please wait a moment.");
    return;
 }

 // Set capture resolution
 canvas.width = 320;
 canvas.height = 240;
 canvas.getContext("2d").drawImage(video, 0, 0, 320, 240);

 const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
 
 // Show preview to user
 document.getElementById("face_preview").src = dataUrl;
 document.getElementById("captured_preview").style.display = "block";

 // Show a loading alert or spinner if needed
 const btn = document.getElementById("faceLoginBtn");
 const originalText = btn.innerText;
 btn.innerText = "Verifying Face...";
 btn.disabled = true;

 fetch("/face_login", {
   method: "POST",
   body: dataUrl
 }).then(res => res.text())
   .then(msg => {
     if(msg === "Face Login Successful"){
        window.location.href = "/dashboard";
     } else {
        alert(msg);
        btn.innerText = originalText;
        btn.disabled = false;
     }
   })
   .catch(err => {
     alert("Error: " + err);
     btn.innerText = originalText;
     btn.disabled = false;
   });
}
</script>

</body>
</html>
