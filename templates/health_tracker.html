<!DOCTYPE html>
<html lang="en">
<head>
<title>TrustShield — Health & Eva AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
    --menstrual: #ff4d6d;
    --follicular: #ffb703;
    --ovulation: #9d4edd;
    --luteal: #3a86ff;
}

body{ 
    margin:0; 
    font-family: 'Poppins', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding-bottom: 100px;
}

/* --- HEADER --- */
.header-glass {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding: 15px 20px;
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
}

/* --- CYCLE VISUALIZER --- */
.cycle-card {
    background: white; border-radius: 24px; padding: 25px 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    text-align: center; margin-bottom: 25px;
    position: relative; overflow: hidden;
}

.cycle-wheel-container {
    position: relative; width: 200px; height: 200px; margin: 0 auto;
}

.cycle-wheel {
    width: 100%; height: 100%; border-radius: 50%;
    /* 28 Day Cycle Visualization */
    background: conic-gradient(
        var(--menstrual) 0deg 65deg,   
        var(--follicular) 65deg 165deg, 
        var(--ovulation) 165deg 195deg, 
        var(--luteal) 195deg 360deg    
    );
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.cycle-inner {
    position: absolute; inset: 12px; background: white; border-radius: 50%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.03);
}

.marker {
    position: absolute; top: 0; left: 50%; width: 4px; height: 15px;
    background: #0f172a; transform-origin: center 100px;
    transform: translateX(-50%) rotate(0deg);
    z-index: 5; transition: transform 1.5s ease-out;
}
.marker::after {
    content:'▼'; position:absolute; top:-14px; left:-6px; font-size:14px; color:#0f172a;
}

/* --- TABS --- */
.nav-pills .nav-link {
    color: #64748b; font-weight: 600; font-size: 13px;
    background: #fff; border: 1px solid #e2e8f0; margin-right: 8px; border-radius: 20px;
}
.nav-pills .nav-link.active {
    background: #0f172a; color: white; border-color: #0f172a;
}
.tip-box {
    background: white; padding: 20px; border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.03);
    min-height: 120px; display: flex; align-items: center;
}

/* --- ANIMATED CHARACTER (EVA) --- */
.eva-container {
    position: fixed; bottom: 20px; right: 20px;
    z-index: 1001;
    display: flex; flex-direction: column; align-items: center;
}

.eva-avatar {
    width: 80px; height: 80px;
    /* UPDATED: Correct Female 3D Avatar (Girl with bun) */
    background-image: url('https://cdn-icons-png.flaticon.com/512/4140/4140051.png');
    background-size: cover;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
    cursor: pointer;
    transition: transform 0.3s, background-image 0.3s;
}

/* STATE 1: IDLE (Breathing) */
.eva-idle { animation: float 4s ease-in-out infinite; }

/* STATE 2: THINKING (Pulsing & Tilting) */
.eva-thinking { 
    animation: pulse 1s infinite alternate; 
    filter: brightness(1.2) drop-shadow(0 0 10px #a855f7);
}

/* STATE 3: SPEAKING (Bobbing/Talking) */
.eva-speaking {
    animation: talk 0.3s infinite alternate;
}

@keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
@keyframes pulse { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.1) rotate(5deg); } }
@keyframes talk  { 0% { transform: translateY(0px) scaleY(1); } 100% { transform: translateY(-5px) scaleY(1.05); } }

.eva-badge {
    background: #333; color: white; padding: 4px 12px; border-radius: 12px;
    font-size: 10px; font-weight: bold; margin-bottom: -10px; z-index: 1002;
    opacity: 0; transition: 0.3s; transform: translateY(10px);
}
.eva-badge.show { opacity: 1; transform: translateY(0); }

/* --- CHAT WINDOW --- */
.chat-window {
    position: fixed; bottom: 110px; right: 20px; width: 340px; height: 480px;
    background: white; border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    display: none; flex-direction: column; overflow: hidden; z-index: 1000;
    border: 1px solid rgba(0,0,0,0.05);
}
.chat-header { 
    background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
    color: white; padding: 15px; font-weight: bold; 
    display: flex; align-items: center; justify-content: space-between; 
}
.chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f8fafc; }
.chat-input-area { padding: 12px; background: white; border-top: 1px solid #f1f1f1; display: flex; gap: 8px; }

.msg { padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; font-size: 13px; max-width: 85%; line-height: 1.5; }
.bot { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
.user { background: #0f172a; color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }
.clear-btn { font-size: 11px; text-decoration: underline; color: rgba(255,255,255,0.8); cursor: pointer; }

/* Date Picker Modal */
dialog {
    width: 90%; max-width: 350px; border: none; border-radius: 20px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2); padding: 25px;
}
dialog::backdrop { background: rgba(0,0,0,0.4); }

@media (max-width: 400px) {
    .chat-window { width: 92%; right: 4%; bottom: 100px; height: 50vh; }
}
</style>
</head>
<body>

<div class="header-glass">
    <button onclick="location.href='/dashboard'" class="btn btn-outline-dark btn-sm rounded-pill px-3">⬅ Back</button>
    <div class="fw-bold" style="font-family:'Quicksand'; font-size:18px;">TrustShield Health</div>
    <button class="btn btn-sm btn-light text-primary fw-bold rounded-pill" onclick="picker.showModal()">📅 Edit</button>
</div>

<div class="container mt-3" style="max-width: 600px;">
    
    <div class="cycle-card">
        <h6 class="text-uppercase text-muted fw-bold small mb-3">Current Cycle Status</h6>
        <div class="cycle-wheel-container">
            <div class="marker" id="progressMarker"></div>
            <div class="cycle-wheel"></div>
            <div class="cycle-inner">
                <h1 class="mb-0 fw-bold" id="dayDisplay" style="font-size: 3rem;">--</h1>
                <small class="text-muted fw-bold">DAY</small>
                <span class="badge rounded-pill mt-2 px-3 py-2" id="phaseBadge" style="font-size:12px;">Loading...</span>
            </div>
        </div>
        <div class="d-flex justify-content-center gap-3 mt-4" style="font-size:11px; font-weight:600;">
            <span style="color:var(--menstrual)">● Period</span>
            <span style="color:var(--follicular)">● Follicular</span>
            <span style="color:var(--ovulation)">● Ovulation</span>
            <span style="color:var(--luteal)">● Luteal</span>
        </div>
    </div>

    <h6 class="fw-bold px-2 mb-2">💡 Today's Insights</h6>
    <ul class="nav nav-pills mb-3 px-1" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="tab-nutri" data-bs-toggle="pill" data-bs-target="#content-nutri">🥗 Nutrition</button></li>
        <li class="nav-item"><button class="nav-link" id="tab-move" data-bs-toggle="pill" data-bs-target="#content-move">💪 Movement</button></li>
        <li class="nav-item"><button class="nav-link" id="tab-mind" data-bs-toggle="pill" data-bs-target="#content-mind">🧠 Self-Care</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="content-nutri"><div class="tip-box"><div class="d-flex gap-3 align-items-start"><div class="fs-1">🥑</div><div><h6 class="fw-bold mb-1">Nutrition</h6><p class="small text-muted mb-0" id="tip-nutri">...</p></div></div></div></div>
        <div class="tab-pane fade" id="content-move"><div class="tip-box"><div class="d-flex gap-3 align-items-start"><div class="fs-1">🧘‍♀️</div><div><h6 class="fw-bold mb-1">Movement</h6><p class="small text-muted mb-0" id="tip-move">...</p></div></div></div></div>
        <div class="tab-pane fade" id="content-mind"><div class="tip-box"><div class="d-flex gap-3 align-items-start"><div class="fs-1">🕯️</div><div><h6 class="fw-bold mb-1">Self-Care</h6><p class="small text-muted mb-0" id="tip-mind">...</p></div></div></div></div>
    </div>
</div>

<div class="eva-container">
    <div id="evaStatus" class="eva-badge">Speaking...</div>
    <div id="evaAvatar" class="eva-avatar eva-idle" onclick="toggleChat()" title="Chat with Eva"></div>
</div>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <div class="d-flex align-items-center gap-2">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" style="width:30px; height:30px;">
            <span>🤖 Eva AI</span>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <span class="clear-btn" onclick="clearHistory()">Reset</span>
            <span style="cursor:pointer;" onclick="toggleChat()">✕</span>
        </div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input-area">
        <input id="userMsg" class="form-control form-control-sm rounded-pill bg-light border-0" placeholder="Ask Eva...">
        <button class="btn btn-dark btn-sm rounded-circle" style="width:32px; height:32px;" onclick="sendMessage()">➤</button>
    </div>
</div>

<dialog id="picker">
 <form action="/update_cycle" method="POST" class="p-2 text-center">
   <div class="fs-1 mb-2">📅</div>
   <h5 class="fw-bold">Update Cycle</h5>
   <input type="date" name="date" class="form-control mt-3 p-3 bg-light border-0 rounded-3" required>
   <button class="btn btn-dark mt-3 w-100 py-3 rounded-pill fw-bold">Save Date</button>
 </form>
 <button class="btn btn-link w-100 text-decoration-none mt-2" onclick="picker.close()">Cancel</button>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const lastDate = "{{ last_date }}" || null;
let currentPhase = "";
let currentDay = 0;

// UPDATED AVATAR URLs
const IMG_HAPPY = "https://cdn-icons-png.flaticon.com/512/4140/4140051.png"; // Girl with Bun
const IMG_THINK = "https://cdn-icons-png.flaticon.com/512/4140/4140047.png"; // Different Girl (Short hair)

// 1. CYCLE LOGIC
function renderCycle(){
    if(!lastDate) {
        document.getElementById("dayDisplay").innerText = "?";
        document.getElementById("phaseBadge").innerText = "Set Date";
        return;
    }
    let start = new Date(lastDate);
    let today = new Date();
    let diff = Math.floor((today-start)/(1000*60*60*24));
    let day = (diff % 28) + 1; 
    currentDay = day;

    document.getElementById("dayDisplay").innerText = day;
    let rotation = (day * 12.85) - 6; 
    document.getElementById("progressMarker").style.transform = `translateX(-50%) rotate(${rotation}deg)`;

    let tips = {
        menstrual: { nutri: "Iron rich foods (spinach). Hydrate.", move: "Light stretching or walking.", mind: "Rest is productive. Sleep well.", color: "var(--menstrual)", name: "Menstruation" },
        follicular: { nutri: "Protein & fermented foods.", move: "Cardio & Strength training.", mind: "Plan big projects now.", color: "var(--follicular)", name: "Follicular" },
        ovulation: { nutri: "Antioxidants (berries).", move: "HIIT or heavy lifting.", mind: "Socialize and connect.", color: "var(--ovulation)", name: "Ovulation" },
        luteal: { nutri: "Complex carbs (oats). Magnesium.", move: "Pilates or Yoga.", mind: "Journaling & self-care.", color: "var(--luteal)", name: "Luteal Phase" }
    };

    let data = tips.luteal;
    if(day <= 5) data = tips.menstrual;
    else if(day <= 13) data = tips.follicular;
    else if(day == 14) data = tips.ovulation;

    currentPhase = data.name;
    document.getElementById("phaseBadge").innerText = currentPhase;
    document.getElementById("phaseBadge").style.backgroundColor = data.color;
    document.getElementById("tip-nutri").innerText = data.nutri;
    document.getElementById("tip-move").innerText = data.move;
    document.getElementById("tip-mind").innerText = data.mind;
    
    // Initial Greeting if history empty
    if(localStorage.getItem("chatHistory") === null) {
        addBubble(`Hi! I'm Eva. You're in your <b>${currentPhase}</b> phase. How are you feeling?`, "bot", false);
    }
}

// 2. ANIMATION CONTROLLER
function setEvaState(state) {
    const ava = document.getElementById("evaAvatar");
    const badge = document.getElementById("evaStatus");
    
    // Reset classes
    ava.className = "eva-avatar"; 
    badge.classList.remove("show");

    if (state === "thinking") {
        ava.style.backgroundImage = `url('${IMG_THINK}')`;
        ava.classList.add("eva-thinking");
        badge.innerText = "Thinking...";
        badge.classList.add("show");
    } else if (state === "speaking") {
        ava.style.backgroundImage = `url('${IMG_HAPPY}')`;
        ava.classList.add("eva-speaking");
        badge.innerText = "Speaking...";
        badge.classList.add("show");
    } else {
        ava.style.backgroundImage = `url('${IMG_HAPPY}')`;
        ava.classList.add("eva-idle");
    }
}

// 3. CHAT LOGIC
window.addEventListener('load', () => {
    const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
    history.forEach(msg => renderBubble(msg.text, msg.type));
    renderCycle();
});

function toggleChat() {
    const win = document.getElementById("chatWindow");
    if(win.style.display === "flex"){
        win.style.display = "none";
    } else {
        win.style.display = "flex";
        scrollToBottom();
    }
}

function scrollToBottom(){
    const body = document.getElementById("chatBody");
    body.scrollTop = body.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("userMsg");
    const txt = input.value.trim();
    if(!txt) return;

    addBubble(txt, "user", true);
    input.value = "";

    // STATE: THINKING
    setEvaState("thinking");
    const typingId = renderBubble("...", "bot"); 

    try {
        const res = await fetch("/health_chat_api", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: txt, day: currentDay, phase: currentPhase })
        });
        const data = await res.json();
        
        document.getElementById(typingId).remove();
        addBubble(data.reply, "bot", true);
        
        // STATE: SPEAKING (Duration based on text length)
        setEvaState("speaking");
        const speakDuration = Math.min(data.reply.length * 50, 4000); 
        setTimeout(() => { setEvaState("idle"); }, speakDuration);
        
    } catch(e) {
        setEvaState("idle");
        document.getElementById(typingId).innerText = "Eva is offline.";
    }
}

function addBubble(text, type, save=true) {
    if(save) {
        const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
        history.push({text: text, type: type});
        localStorage.setItem("chatHistory", JSON.stringify(history));
    }
    return renderBubble(text, type);
}

function renderBubble(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerHTML = text;
    div.id = "msg-" + Date.now() + Math.random();
    const body = document.getElementById("chatBody");
    body.appendChild(div);
    scrollToBottom();
    return div.id;
}

function clearHistory() {
    localStorage.removeItem("chatHistory");
    document.getElementById("chatBody").innerHTML = "";
    addBubble("History cleared. Hello!", "bot", true);
}
</script>
</body>
</html>
