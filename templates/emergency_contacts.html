<!DOCTYPE html>
<html>
<head>
<title>Emergency Contacts – TrustShield</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{ background:linear-gradient(135deg,#ffd6e8,#dff3ff); font-family:Poppins, Arial; min-height: 100vh; }

.box{ 
    background:white; 
    border-radius:22px; 
    padding:25px; 
    box-shadow:0 25px 80px rgba(0,0,0,.15); 
    
    /* Responsive Width */
    width: 100%;
    max-width: 600px;
    margin: auto;
}

.contact-card{ 
    background:#f6f8ff; 
    border-radius:16px; 
    padding:15px; 
    box-shadow:0 5px 15px rgba(0,0,0,.05); 
    margin-bottom: 10px;
}

.tag{ 
    font-size:11px; 
    padding:4px 10px; 
    border-radius:18px; 
    background:#ffe9f2; 
    color:#c2185b; 
    font-weight: 700;
    text-transform: uppercase;
}

/* Better Input Styling */
input.form-control {
    border-radius: 10px;
    padding: 10px;
}

/* Mobile Tweaks */
@media (max-width: 576px) {
    .box { padding: 20px; }
    h2 { font-size: 1.5rem; }
}
</style>
</head>

<body class="p-3 p-md-4">

<div class="container p-0">
    <div class="box">
      
      <button onclick="location.href='/dashboard'" class="btn btn-outline-dark btn-sm mb-3">⬅ Dashboard</button>
      <h2 class="fw-bold text-center">📞 Emergency Contacts</h2>
      <hr>

      <h5 class="fw-bold text-dark mb-3">🚨 Saved Contacts</h5>
      
      {% if contacts %}
          {% for c in contacts %}
          <div class="contact-card d-flex justify-content-between align-items-center">
            <div>
                <div class="mb-1">
                    <b class="fs-5">{{ c.name }}</b> <span class="tag ms-1">{{ c.relation }}</span>
                </div>
                <div class="text-muted">
                    📞 <a href="tel:{{ c.phone }}" class="text-decoration-none text-dark fw-bold">{{ c.phone }}</a>
                </div>
            </div>
            
            <form action="/delete_contact" method="POST" class="ms-2">
                <input type="hidden" name="name" value="{{ c.name }}">
                <input type="hidden" name="relation" value="{{ c.relation }}">
                <input type="hidden" name="phone" value="{{ c.phone }}">
                <button type="submit" class="btn btn-danger btn-sm px-3 py-2 rounded-3">🗑</button>
            </form>
          </div>
          {% endfor %}
      {% else %}
          <div class="alert alert-light text-center text-muted border border-dashed py-4">
            No contacts saved yet.
          </div>
      {% endif %}

      <hr class="my-4">

      <h5 class="fw-bold text-dark">➕ Add New Contact</h5>
      <form action="/add_contact" method="POST">
          <input name="name" class="form-control mt-2" placeholder="Name (eg: Mom)" required>
          
          <div class="row g-2 mt-2">
            <div class="col-6">
                <input name="relation" class="form-control" placeholder="Relation" required>
            </div>
            <div class="col-6">
                <input name="phone" type="tel" class="form-control" placeholder="Phone No." required>
            </div>
          </div>
          
          <button type="submit" class="btn btn-dark mt-3 w-100 py-2 fw-bold shadow-sm">Save Contact</button>
      </form>

    </div>
</div>

</body>
</html>
