<!DOCTYPE html>
<html>
<head>
<title>Admin Login — TrustShield</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* ... SAME CSS ... */
body{ margin:0; height:100vh; display:flex; justify-content:center; align-items:center; font-family: 'Segoe UI'; background: radial-gradient(circle at top, #0f172a, #020617); color:white; }
.bg{ position:absolute; width:400px; height:400px; border-radius:50%; filter:blur(120px); opacity:.45; }
.b1{ background:#2563eb; top:5%; left:10%; } .b2{ background:#ec4899; bottom:5%; right:10%; }
.card-box{ width:420px; padding:30px; border-radius:20px; background:rgba(255,255,255,.06); backdrop-filter:blur(18px); box-shadow:0 0 80px rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.15); }
input{ background:rgba(255,255,255,.15); border:none; color:white; }
.btn-login{ background:linear-gradient(90deg,#60a5fa,#6366f1); border:none; font-weight:600; }
</style>
</head>
<body>

<div class="bg b1"></div>
<div class="bg b2"></div>

<div class="card-box">
  <h3>🛡 Admin Login</h3>
  <p class="text-muted">Secure access — Authorized personnel only</p>

  {% if error %}
  <p class="text-danger text-center">{{ error }}</p>
  {% endif %}

  <form action="/admin_auth" method="POST">
      <input name="email" class="form-control mt-3" placeholder="Admin Email" required>
      <input name="password" type="password" class="form-control mt-3" placeholder="Password" required>
      <button type="submit" class="btn btn-login w-100 mt-3">Login</button>
  </form>
</div>

</body>
</html>
