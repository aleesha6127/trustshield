<!DOCTYPE html>
<html>
<head>
<title>New Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  min-height:100vh; font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex; justify-content:center; align-items:center; color:white;
}
.cardy{
  width:100%; max-width:400px; padding:30px; 
  background:rgba(255,255,255,0.1); backdrop-filter:blur(15px);
  border-radius:20px;
}
input{ background:rgba(255,255,255,0.1)!important; border:none!important; color:white!important; }
</style>
</head>
<body>
<div class="cardy text-center">
  <h4 class="fw-bold mb-3">Reset Password</h4>
  <p class="small text-white-50">Create a strong new password</p>
  
  {% if error %} <div class="alert alert-danger p-2 small">{{ error }}</div> {% endif %}

  <form method="POST">
    <input name="password" type="password" class="form-control p-3 mb-2" placeholder="New Password" required>
    <input name="confirm_password" type="password" class="form-control p-3 mb-3" placeholder="Confirm Password" required>
    <button class="btn btn-primary w-100 py-2 fw-bold">Update Password</button>
  </form>
</div>
</body>
</html>
