<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  min-height:100vh; font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex; justify-content:center; align-items:center;
  color:white;
}
.cardy{
  width:100%; max-width:400px; padding:30px; 
  background:rgba(255,255,255,0.1); backdrop-filter:blur(15px);
  border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
input{ background:rgba(255,255,255,0.1)!important; border:none!important; color:white!important; }
input::placeholder{ color:#aaa; }
</style>
</head>
<body>
<div class="cardy text-center">
  <h4 class="fw-bold mb-3">Forgot Password?</h4>
  <p class="small text-white-50">Enter your registered email to receive an OTP.</p>
  
  {% if error %} <div class="alert alert-danger p-2 small">{{ error }}</div> {% endif %}

  <form method="POST">
    <input name="email" type="email" class="form-control p-3 mb-3" placeholder="name@example.com" required>
    <button class="btn btn-primary w-100 py-2 fw-bold">Send OTP</button>
  </form>
  <a href="/login" class="d-block mt-3 small text-white-50 text-decoration-none">Back to Login</a>
</div>
</body>
</html>
