<!DOCTYPE html>
<html>
<head>
<title>Emergency SOS – Panic Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#120000;
  color:white;
  font-family:'Inter', Arial;
  height:100vh;
  overflow-x:hidden;
}

/* --- TOPBAR --- */
.topbar { 
  background: rgba(30, 0, 0, 0.95); 
  backdrop-filter: blur(12px);
  height: 60px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 0 20px; 
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
  border-bottom: 1px solid rgba(255, 0, 0, 0.2);
  position: fixed; 
  top: 0; 
  width: 100%; 
  z-index: 1000;
}

.topbar h4 {
  margin: 0;
  font-weight: 700;
  font-size: 18px;
  color: #ff5252;
}

/* --- COLLAPSIBLE SIDEBAR --- */
.sidebar { 
  width: 260px; 
  height: calc(100vh - 60px); 
  background: #1e0000;
  color: white; 
  position: fixed; 
  top: 60px; 
  left: -260px;
  padding: 20px; 
  transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
  z-index: 999; 
  overflow-y: auto;
  box-shadow: 4px 0 20px rgba(0,0,0,0.5);
  border-right: 1px solid rgba(255, 0, 0, 0.2);
}

.sidebar.open {
  left: 0;
}

.menu-item { 
  padding: 12px 15px; 
  border-radius: 12px; 
  margin-bottom: 8px; 
  cursor: pointer; 
  font-size: 15px; 
  font-weight: 500;
  transition: all 0.2s ease;
  display: flex; align-items: center; gap: 12px; 
  color: #cbd5e1;
  text-decoration: none;
}

.menu-item:hover { 
  background: rgba(255, 0, 0, 0.2); 
  color: white;
  transform: translateX(5px);
}

.active { 
  background: linear-gradient(90deg, #dc2626, #ef4444); 
  color: white; 
  box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
}

/* Mobile Overlay */
#mobOverlay {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100vh - 60px);
  background: rgba(0, 0, 0, 0.7);
  display: none;
  z-index: 998;
}

#mobOverlay.show {
  display: block;
}

/* --- MAIN CONTENT --- */
.main-content {
  margin-top: 60px;
  height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* main center card */
.center-card{ 
  text-align: center;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

/* big SOS button */
.sos-btn{
  width:190px;
  height:190px;
  border-radius:50%;
  border:none;
  color:white;
  font-size:38px;
  font-weight:900;
  background:radial-gradient(circle,#ff7070,#ff0000);
  animation:pulse 1.1s infinite;
  box-shadow:0 0 40px red;
  cursor: pointer;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.15)}
  100%{transform:scale(1)}
}

/* POPUP BOX */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 999;
}

.popup-card{
  width:330px;
  background:white;
  color:black;
  padding:18px;
  border-radius:18px;
  text-align:center;
}

.count{ font-size:65px; font-weight:900; color: #dc3545; }

/* Toggle Button */
.menu-toggle {
  background: rgba(255, 0, 0, 0.2);
  border: 1px solid rgba(255, 0, 0, 0.3);
  color: #ff5252;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.3s;
}

.menu-toggle:hover {
  background: rgba(255, 0, 0, 0.3);
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .sos-btn {
    width: 160px;
    height: 160px;
    font-size: 32px;
  }
  .center-card h2 {
    font-size: 1.5rem;
  }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="d-flex align-items-center gap-3">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <h4>🚨 PANIC MODE</h4>
  </div>
  <button onclick="location.href='/dashboard'" class="btn btn-outline-danger btn-sm">Exit</button>
</div>

<!-- COLLAPSIBLE SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h6 class="text-muted text-uppercase small mb-3">Emergency Menu</h6>
  
  <a href="/dashboard" class="menu-item">
    <span>🏠</span> Dashboard
  </a>
  
  <a href="/panic_mode" class="menu-item active">
    <span>🚨</span> SOS Alert
  </a>
  
  <a href="/journey" class="menu-item">
    <span>🧭</span> Journey Tracker
  </a>
  
  <a href="/report" class="menu-item">
    <span>📝</span> Report Incident
  </a>
  
  <a href="/emergency_contacts" class="menu-item">
    <span>📞</span> Emergency Contacts
  </a>
  
  <a href="/danger_zone" class="menu-item">
    <span>📍</span> Danger Zones
  </a>
  
  <hr class="border-secondary my-3">
  
  <a href="/logout" class="menu-item text-danger">
    <span>🚪</span> Logout
  </a>
</div>

<!-- Mobile Overlay -->
<div id="mobOverlay" onclick="toggleMenu()"></div>

<!-- MAIN CONTENT -->
<div class="main-content">
  <div class="center-card">
    <h2>🚨 PANIC MODE</h2>
    <p>Tap SOS if you are in danger</p>
    <button class="sos-btn" id="sosPress">SOS</button>
  </div>
</div>

<div id="popup">
  <div class="popup-card">
    <h4>SOS will be sent in</h4>
    <div class="count" id="count">5</div>
    <p id="status">Sharing your live location…</p>
    <button class="btn btn-dark w-100 mb-2" onclick="cancelSOS()">Cancel</button>
  </div>
</div>

<audio id="alarm" loop>
  <source src="https://www.soundjay.com/phone/telephone-ring-03a.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ---------- MENU TOGGLE ----------
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("mobOverlay").classList.toggle("show");
}

// ---------- ELEMENTS ----------
let sosButton = document.getElementById("sosPress");
let popup = document.getElementById("popup");
let countBox = document.getElementById("count");
let alarm = document.getElementById("alarm");
let timer;
let sending = false;

// ---------- ON SOS PRESS ----------
sosButton.onclick = ()=>{
  popup.style.display="flex";
  alarm.play(); // Start Noise
  
  let sec = 5;
  countBox.innerHTML = sec;
  sending = false;

  timer = setInterval(()=>{
    sec--;
    countBox.innerHTML = sec;

    if(sec === 0){
      clearInterval(timer);
      sendSOS();
    }
  },1000);
};

// ---------- CANCEL ----------
window.cancelSOS = function(){
  clearInterval(timer);
  alarm.pause();
  alarm.currentTime = 0;
  popup.style.display="none";
  if(sending) alert("Alert was already sent!");
};

// ---------- SEND SOS TO PYTHON ----------
async function sendSOS(){
  sending = true;
  document.getElementById("status").innerHTML = "📡 sending location to server...";

  if(!navigator.geolocation){
      document.getElementById("status").innerHTML = "⚠ GPS not supported";
      return;
  }

  navigator.geolocation.getCurrentPosition(async(pos)=>{
    try {
        // CALL PYTHON API
        let response = await fetch("/send_sos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
            // UID is handled by Python Session automatically
          })
        });
        
        let result = await response.json();
        
        if(result.status === "SOS Sent"){
            document.getElementById("status").innerHTML = "✔ SOS SENT TO " + result.contacts_notified + " CONTACTS";
            // Stop alarm after 2 seconds of success
            setTimeout(()=>{ alarm.pause(); }, 2000);
        } else {
            document.getElementById("status").innerHTML = "⚠ Server Error";
        }

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerHTML = "⚠ Connection Failed";
    }
  }, (err)=>{
    document.getElementById("status").innerHTML = "⚠ GPS Permission Denied";
  });
}
</script>

</body>
</html>
